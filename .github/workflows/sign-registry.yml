name: Sign Registry
on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install pynacl
        run: pip install pynacl
      
      - name: Sign registry
        env:
          REGISTRY_SIGNING_KEY: ${{ secrets.REGISTRY_SIGNING_KEY }}
        run: |
          python -c "
          import json, base64, hashlib
          from nacl.signing import SigningKey
          import os

          key_b64 = os.environ['REGISTRY_SIGNING_KEY']
          signing_key = SigningKey(base64.b64decode(key_b64))

          with open('registry/index.json', 'rb') as f:
              content = f.read()
          content = content.replace(b'\r\n', b'\n')

          signed = signing_key.sign(content)
          signature = base64.b64encode(signed.signature).decode()
          content_hash = hashlib.sha256(content).hexdigest()

          sig = {
              'signature': signature,
              'algorithm': 'ed25519',
              'signed_bytes': len(content),
              'content_sha256': content_hash,
          }
          with open('registry/index.json.sig', 'w') as f:
              json.dump(sig, f, indent=2)

          print(f'Signed registry ({len(content)} bytes)')
          print(f'  SHA-256: {content_hash[:32]}...')
          print(f'  Signature: {signature[:32]}...')
          "
      
      - name: Commit signature
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/index.json.sig
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: re-sign registry v2.0.0" && git push)
