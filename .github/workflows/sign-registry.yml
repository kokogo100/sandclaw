name: Sign Registry
on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install pynacl
        run: pip install pynacl
      
      - name: Sign registry
        env:
          REGISTRY_SIGNING_KEY: ${{ secrets.REGISTRY_SIGNING_KEY }}
        run: python tools/sign_registry.py
      
      - name: Commit signature
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/index.json.sig
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: re-sign registry v2.0.0" && git push)
